# Auto-load every dashboard JSON mounted at /var/lib/grafana/dashboards
# (see docker-compose.yaml: ./grafana/dashboards is mounted read-only).
apiVersion: 1

providers:
  - name: delivery-risk
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
