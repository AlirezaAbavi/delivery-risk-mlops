name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Match the runtime: the API image and the pipeline venv both run Python 3.12.
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # The tests run in-process (no DB/MLflow); don't try to resolve a model on import.
          LOAD_MODEL_ON_STARTUP: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q tests

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t delivery-risk-api .

      - name: Validate compose config
        run: docker compose config --quiet
